<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet" >
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>
<body class="page">
  <div class="info">
    <img src="./eisenhower-matrix.jpg" class="info__img" alt="Eisenhower matrix">
    <a class="info__link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </div>
  <div class="main-part">
    <p id="new-task__title">
      <label for="new-task__input" class="label new-task__label">Add Item</label>
      <div class="new-task__row-wrapper">
        <input id="new-task__input" class="task input input_text" type="text">
        <button class="button">Add</button>
      </div>
    </p>
    <h3 class="title">Todo</h3>
    <ul id="incomplete-tasks" class="todo-list">
      <li class="todo-list__item">
        <input type="checkbox" class="input input_check">
        <label class="label task">Pay Bills</label>
        <input type="text" class="task input input_text">
        <button class="button button_edit">Edit</button>
        <button class="button button_delete">
          <img src="./remove.svg" class="img-remove" alt="Remove">
        </button>
      </li>
      <li class="edit-mode todo-list__item">
        <input type="checkbox" class="input input_check">
        <label class="label task">Go Shopping</label>
        <input type="text" value="Go Shopping" class="task input input_text">
        <button class="button button_edit">Save</button>
        <button class="button button_delete">
          <img src="./remove.svg" class="img-remove" alt="Remove">
        </button>
      </li>
    </ul>
    <h3 class="title">Completed</h3>
    <ul id="complete-tasks" class="todo-list">
      <li class="todo-list__item">
        <input type="checkbox" checked class="input input_check">
        <label class="label task">See the Doctor</label>
        <input type="text" class="task input input_text">
        <button class="button button_edit">Edit</button>
        <button class="button button_delete">
          <img src="./remove.svg" class="img-remove" alt="Remove">
        </button>
      </li>
    </ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
